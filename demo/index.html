<style>
  :root{--accent:#F5356E;--ink:#0E0E12;--dim:#55555F}
  *{box-sizing:border-box;margin:0;padding:0}

  .nav{max-width:940px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:9px;font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.03em}

  main{padding:60px 0 84px;text-align:center}
  .eyebrow{font-size:12.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
  h1{font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:clamp(2.2rem,5vw,3.6rem);letter-spacing:-.03em;line-height:1.02;margin-bottom:16px}
  .sub{font-size:18px;color:var(--dim);max-width:540px;margin:0 auto 40px}
  .video{position:relative;width:100%;padding-top:56.25%;border-radius:22px;overflow:hidden;background:#000;box-shadow:0 44px 100px -44px rgba(14,14,18,.5);border:1px solid rgba(14,14,18,.08)}
  .video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .cta{display:inline-flex;align-items:center;gap:9px;margin-top:44px;background:var(--accent);color:#fff;font-weight:600;font-size:16.5px;padding:15px 27px;border-radius:999px;box-shadow:0 14px 32px -10px color-mix(in srgb,var(--accent) 62%,transparent);transition:transform .18s}

  footer{border-top:1px solid rgba(14,14,18,.06);padding:28px 0;text-align:center;color:#9A9AA4;font-size:13px}
